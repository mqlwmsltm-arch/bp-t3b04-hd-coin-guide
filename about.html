    <style>
        /* ---------- CSS 변수 & 리셋 ---------- */
        :root {
            --bg: #0a0a0a;
            --fg: #e0e0e0;
            --accent: #ff2a75;
            --accent2: #00e5ff;
            --accent3: #f5a623;
            --border-color: #333;
            --card-bg: #111;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --font-sans: 'Inter', 'Noto Sans KR', system-ui, sans-serif;
            --max-width: 1200px;
            --header-h: 64px;
        }
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html {
            scroll-behavior: smooth;
        }
        body {
            background: var(--bg);
            color: var(--fg);
            font-family: var(--font-sans);
            font-size: 16px;
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }
        img {
            max-width: 100%;
            display: block;
        }
        a {
            color: var(--accent2);
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        /* ---------- 헤더 & 네비게이션 ---------- */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: var(--header-h);
            background: rgba(10,10,10,.92);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 24px;
        }
        .logo {
            font-family: var(--font-mono);
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--accent);
            margin-right: auto;
        }
        .logo span {
            color: var(--fg);
        }
        nav {
            display: flex;
            gap: 28px;
            align-items: center;
        }
        nav a {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--fg);
            transition: color .2s;
            position: relative;
        }
        nav a:hover,
        nav a.active {
            color: var(--accent);
        }
        nav a.active::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--accent);
        }
        /* 햄버거 메뉴 버튼 (모바일) */
        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            width: 28px;
            height: 28px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            z-index: 1001;
        }
        .hamburger span {
            display: block;
            width: 100%;
            height: 2px;
            background: var(--fg);
            transition: all .3s;
        }
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px,5px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px,-5px);
        }
        /* ---------- 메인 콘텐츠 ---------- */
        main {
            padding-top: calc(var(--header-h) + 40px);
            padding-bottom: 80px;
            max-width: var(--max-width);
            margin: 0 auto;
            padding-left: 24px;
            padding-right: 24px;
        }
        /* 히어로 */
        .hero {
            padding: 60px 0 40px;
            border-bottom: 2px solid var(--accent);
            margin-bottom: 60px;
        }
        .hero h1 {
            font-family: var(--font-mono);
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -.02em;
            line-height: 1.1;
            color: var(--fg);
        }
        .hero h1 span {
            color: var(--accent);
        }
        .hero p {
            font-size: 1.1rem;
            color: #aaa;
            max-width: 720px;
            margin-top: 20px;
        }
        /* 데이터 카드 그리드 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
            margin-bottom: 60px;
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 28px 24px;
            text-align: center;
            transition: border-color .3s, transform .3s;
        }
        .stat-card:hover {
            border-color: var(--accent);
            transform: translateY(-4px);
        }
        .stat-card .number {
            font-family: var(--font-mono);
            font-size: 2.8rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }
        .stat-card .label {
            margin-top: 12px;
            font-size: 0.95rem;
            color: #bbb;
        }
        .stat-card .sub {
            font-size: 0.8rem;
            color: #777;
            margin-top: 6px;
        }
        /* 상세 정보 섹션 */
        .detail-section {
            margin-bottom: 60px;
        }
        .detail-section h2 {
            font-family: var(--font-mono);
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -.01em;
            border-left: 4px solid var(--accent2);
            padding-left: 16px;
            margin-bottom: 32px;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
        }
        .detail-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 24px;
        }
        .detail-card h3 {
            font-family: var(--font-mono);
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent3);
            margin-bottom: 12px;
        }
        .detail-card p,
        .detail-card li {
            color: #ccc;
            font-size: 0.95rem;
        }
        .detail-card ul {
            list-style: none;
            padding-left: 0;
        }
        .detail-card ul li {
            padding: 6px 0;
            border-bottom: 1px solid #222;
        }
        .detail-card ul li:last-child {
            border-bottom: none;
        }
        .detail-card ul li::before {
            content: '▸ ';
            color: var(--accent2);
        }
        /* FAQ */
        .faq {
            margin-bottom: 40px;
        }
        .faq h2 {
            font-family: var(--font-mono);
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -.01em;
            border-left: 4px solid var(--accent);
            padding-left: 16px;
            margin-bottom: 32px;
        }
        .faq-item {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            margin-bottom: 12px;
            padding: 20px 24px;
        }
        .faq-item .question {
            font-weight: 600;
            font-size: 1.05rem;
            color: var(--fg);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .faq-item .question::after {
            content: '+';
            color: var(--accent);
            font-size: 1.4rem;
            font-weight: 300;
            transition: transform .3s;
        }
        .faq-item.active .question::after {
            content: '−';
            transform: rotate(180deg);
        }
        .faq-item .answer {
            margin-top: 14px;
            color: #bbb;
            font-size: 0.95rem;
            line-height: 1.7;
            display: none;
        }
        .faq-item.active .answer {
            display: block;
        }
        /* ---------- 푸터 ---------- */
        footer {
            border-top: 1px solid var(--border-color);
            padding: 32px 24px;
            text-align: center;
            color: #666;
            font-size: 0.85rem;
        }
        footer a {
            color: #888;
        }
        /* ---------- 반응형 768px ---------- */
        @media (max-width: 768px) {
            header {
                padding: 0 16px;
            }
            nav {
                position: fixed;
                top: var(--header-h);
                left: 0;
                width: 100%;
                background: rgba(10,10,10,.98);
                flex-direction: column;
                gap: 0;
                padding: 20px 16px;
                transform: translateY(-100%);
                opacity: 0;
                pointer-events: none;
                transition: transform .4s, opacity .4s;
                border-bottom: 1px solid var(--border-color);
            }
            nav.open {
                transform: translateY(0);
                opacity: 1;
                pointer-events: auto;
            }
            nav a {
                padding: 14px 0;
                border-bottom: 1px solid #222;
                width: 100%;
            }
            nav a:last-child {
                border-bottom: none;
            }
            .hamburger {
                display: flex;
            }
            .hero {
                padding: 40px 0 30px;
            }
            .hero h1 {
                font-size: 1.8rem;
            }
            .stat-card .number {
                font-size: 2rem;
            }
            .detail-section h2,
            .faq h2 {
                font-size: 1.4rem;
            }
            main {
                padding-left: 16px;
                padding-right: 16px;
            }
        }
        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
            .detail-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
